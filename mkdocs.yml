# MkDocs 配置 - 柠健康 APP 用户手册

site_name: 柠健康 APP 用户手册
site_description: 柠健康 APP 官方使用指南，帮助用户快速上手和掌握各项功能
site_author: 柠健康团队

# 主题
theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换至暗色模式
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换至亮色模式
  logo: assets/logo.png
  favicon: assets/favicon.ico

# 为 GitHub Pages 配置
repo_url: https://github.com/your-username/ninghealth-manual
repo_name: GitHub

# 导航
nav:
  - 首页: index.md
  - 快速开始:
      - 下载安装: getting-started/install.md
      - 注册登录: getting-started/login.md
      - 首次使用: getting-started/first-use.md
  - 核心功能:
      - 健康档案: features/health-record.md
      - 就医预约: features/appointment.md
      - 健康监测: features/monitor.md
      - 药品管理: features/medicine.md
      - 健康资讯: features/news.md
  - 高级功能:
      - 家庭成员: advanced/family.md
      - 健康目标: advanced/goals.md
      - 数据同步: advanced/sync.md
  - 帮助与支持:
      - 常见问题: faq/faq.md
      - 联系我们: contact.md

# 插件
plugins:
  - search:
      lang: zh

# Markdown 扩展
markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true

# Extra 配置
extra:
  social:
    - icon: fontawesome/brands/wechat
      link: https://weixin.qq.com
    - icon: fontawesome/brands/weibo
      link: https://weibo.com

Copyright: © 2024 柠健康团队
